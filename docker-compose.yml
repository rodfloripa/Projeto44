services:
  graph_rag:
    build: .
    container_name: graph_rag_app
    depends_on:
      - neo4j
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  neo4j:
    image: neo4j:5
    container_name: neo4j_graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/test1234
